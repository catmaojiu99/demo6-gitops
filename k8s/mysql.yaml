apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: demo6
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: demo6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
    spec:
      nodeSelector:
        kubernetes.io/hostname: ubuntu
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: Never
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "demo6_dev_password"
            - name: MYSQL_DATABASE
              value: "demo6_db"
            - name: MYSQL_CHARSET
              value: "utf8mb4"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-pdemo6_dev_password"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: demo6
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
