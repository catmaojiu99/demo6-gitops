apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo6-ingress
  namespace: demo6
  annotations:
    # 关闭缓冲，支持 SSE 流式
    traefik.ingress.kubernetes.io/buffering: "false"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
